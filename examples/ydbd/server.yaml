listen_addr: ":27312"
writer_backend: "ydb"
position_store: "ydb"
position_table: "loglugger_positions"
field_mapping_file: "examples/ydbd/field_mapping.yaml"
# Parse timezone-less timestamps using OS local timezone before saving.
# Useful for local-time log formats, but dangerous if hosts/timezones are inconsistent.
# convert_time_to_local_tz: true

# YDB destination settings.
ydb_endpoint: "grpcs://localhost:2135"
ydb_database: "/local"
ydb_table: "ydblogs"
ydb_auth_mode: "anonymous" # anonymous|static|service-account-key|metadata
# ydb_auth_login: ""
# ydb_auth_password: ""
# ydb_auth_sa_key_file: ""
# ydb_auth_metadata_url: ""
# ydb_ca_path: "/etc/ydb/ca.pem"

# mTLS server settings (same model as the default example).
tls_cert_file: "certs/server.crt"
tls_key_file: "certs/server.key"
tls_ca_file: "certs/ca.crt"
# tls_ca_path: "certs/ca"
