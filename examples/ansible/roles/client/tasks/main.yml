---
- name: Initialize default client server URLs
  ansible.builtin.set_fact:
    _loglugger_client_server_urls_default: []
  when: loglugger_client_server_urls | length == 0

- name: Build default client server URLs from inventory
  ansible.builtin.set_fact:
    _loglugger_client_server_urls_default: >-
      {{
        (_loglugger_client_server_urls_default | default([]))
        + [
          loglugger_client_server_scheme
          ~ "://"
          ~ (hostvars[item].ansible_host | default(item))
          ~ ":"
          ~ (loglugger_client_server_port | string)
        ]
      }}
  loop: "{{ groups[loglugger_client_server_group] | default([]) }}"
  when: loglugger_client_server_urls | length == 0

- name: Select effective client server URLs
  ansible.builtin.set_fact:
    loglugger_client_effective_server_urls: >-
      {{
        loglugger_client_server_urls
        if (loglugger_client_server_urls | length > 0)
        else (_loglugger_client_server_urls_default | default([]))
      }}

- name: Fail when no client server URLs are available
  ansible.builtin.fail:
    msg: >-
      No client server URLs configured. Set loglugger_client_server_urls
      or ensure the inventory has hosts in group {{ loglugger_client_server_group }}.
  when: loglugger_client_effective_server_urls | length == 0

- name: Create Loglugger directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ loglugger_prefix }}"
    - "{{ loglugger_prefix }}/bin"
    - "{{ loglugger_prefix }}/config"

- name: Install loglugger-client binary
  ansible.builtin.copy:
    src: "{{ loglugger_local_bin_dir }}/loglugger-client"
    dest: "{{ loglugger_prefix }}/bin/loglugger-client"
    mode: "0755"

- name: Install client config
  ansible.builtin.template:
    src: loglugger-client.yaml.j2
    dest: "{{ loglugger_prefix }}/config/loglugger-client.yaml"
    mode: "0644"
  notify: Restart loglugger-client

- name: Install systemd unit
  ansible.builtin.template:
    src: loglugger-client.service.j2
    dest: /etc/systemd/system/loglugger-client.service
    mode: "0644"
  notify: Restart loglugger-client

- name: Ensure loglugger-client is enabled and running
  ansible.builtin.systemd:
    name: loglugger-client.service
    daemon_reload: true
    enabled: true
    state: started
