listen_addr: ":27312"
writer_backend: "mock"
max_compressed_body_bytes: 8388608
max_decompressed_body_bytes: 33554432
position_table: "loglugger_positions"
field_mapping_file: "examples/mappings/basic.yaml"

tls_cert_file: "certs/server.crt"
tls_key_file: "certs/server.key"
tls_ca_file: "certs/ca.crt"

# Optional client certificate subject restrictions.
# Supports literal values and regex: entries prefixed with "regex:".
# tls_client_subject_cn:
#   - "client-local"
# tls_client_subject_o:
#   - "dev"
# tls_client_subject_ou:
#   - "local"

# Enable YDB writer (and YDB-backed position store) by switching writer_backend to "ydb"
# and setting the values below.
# ydb_endpoint: "grpcs://localhost:2135"
# ydb_database: "/local"
# ydb_table: "logs"
# ydb_auth_mode: "anonymous" # anonymous|static|service-account-key|metadata
# ydb_auth_login: ""
# ydb_auth_password: ""
# ydb_auth_sa_key_file: ""
# ydb_auth_metadata_url: ""
# ydb_ca_path: "/etc/ydb/ca.pem"
ydb_open_timeout: "10s"
