server_url: "https://localhost:27312"
client_id: "myhost"
service_mask: ""
journal_namespace: ""
journal_recovery: false

# Optional client-side parsing.
message_regex: '^(?:(?P<P_DTTM>[^ ]+)\s+)?:(?P<P_SERVICE>[^ ]+)\s+(?P<P_LEVEL>[^ ]+):\s+(?P<P_MESSAGE>.*)$'
# systemd_unit_regex: '^(?P<P_UNIT_NAME>[^@]+)@(?P<P_UNIT_SHARD>[^.]+)\.service$'
message_regex_no_match: "send_raw" # send_raw|skip

debug: false
batch_size: 50000
batch_timeout: "5s"
http_timeout: "30s"
retry_delay: "1s"

tls_ca_file: "certs/ca.crt"
tls_cert_file: "certs/client.crt"
tls_key_file: "certs/client.key"
tls_use_system_pool: false
